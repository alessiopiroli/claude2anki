<div class="container">
<div class="pane question-side">
<div class="scroll-content">{{Front}}</div>

<div class="scratchpad-container">
<div id="math-preview" class="tex2jax_process"></div>
<textarea id="scratchpad" placeholder="Type LaTeX here..."></textarea>
</div>
</div>
<div class="pane answer"></div>
</div>

<script>
(function() {
try {
if (!document.querySelector('meta[name="viewport"]')) {
var m = document.createElement('meta');
m.name = 'viewport';
m.content = 'width=device-width, initial-scale=1';
document.head.appendChild(m);
}
} catch (e) {}

try {
if (!window.MathJax) {
window.MathJax = {
tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
options: { processHtmlClass: 'tex2jax_process' }
};
var s = document.createElement('script');
s.async = true;
s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
document.head.appendChild(s);
}
} catch (e) {}

var box = document.getElementById('scratchpad');
var preview = document.getElementById('math-preview');

function typesetPreview(tries) {
if (window.MathJax && window.MathJax.typesetPromise) {
window.MathJax.typesetPromise([preview]);
} else if (tries > 0) {
setTimeout(function() { typesetPreview(tries - 1); }, 250);
}
}

function updatePreview() {
var content = box.value;
preview.innerHTML = content
.replace(/\$([^$\n]+)\$/g, '\\($1\\)')
.replace(/\n/g, '<br>');
try { sessionStorage.setItem('anki_scratchpad', content); } catch (e) {}
typesetPreview(1);
}

box.addEventListener('input', updatePreview);

box.addEventListener('keydown', function(e) {
if (e.key === 'Enter' && !e.shiftKey) {
if (typeof pycmd !== 'undefined') { e.preventDefault(); pycmd('ans'); return; }
var btn = document.getElementById('ansbutton') || document.querySelector('#answer');
if (btn) { e.preventDefault(); btn.click(); }
}
});

var isTouch = false;
try { isTouch = window.matchMedia('(pointer: coarse)').matches; } catch (e) {}
if (!isTouch) { try { box.focus(); } catch (e) {} }

try {
var currentContent = document.querySelector('.scroll-content').innerText;
if (window.lastCardShown !== currentContent) {
sessionStorage.removeItem('anki_scratchpad');
window.lastCardShown = currentContent;
}
} catch (e) {}
})();
</script>
