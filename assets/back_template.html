<script>
window.MathJax = {
tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
options: { processHtmlClass: 'tex2jax_process' }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<div class="container">
<div class="pane question-side">
<div class="scroll-content">{{Front}}</div>
<div class="scratchpad-container">
<div id="math-preview" class="tex2jax_process"></div>
<textarea id="scratchpad"></textarea>
</div>
</div>
<div class="pane answer">{{Back}}</div>
</div>

<script>
(function() {
const box = document.getElementById('scratchpad');
const preview = document.getElementById('math-preview');
const saved = sessionStorage.getItem('anki_scratchpad');

if (saved) {
box.value = saved;
preview.innerHTML = saved.replace(/\n/g, '<br>');
setTimeout(() => {
if (window.MathJax && window.MathJax.typesetPromise) {
window.MathJax.typesetPromise([preview]);
}
}, 100);
}

box.addEventListener('input', function() {
preview.innerHTML = box.value.replace(/\n/g, '<br>');
sessionStorage.setItem('anki_scratchpad', box.value);
if (window.MathJax && window.MathJax.typesetPromise) {
window.MathJax.typesetPromise([preview]);
}
});
})();
</script>
